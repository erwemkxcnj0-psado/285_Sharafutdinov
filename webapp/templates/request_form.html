{% extends "base.html" %}

{% block title %}Новая заявка — Конди{% endblock %}

{% block content %}
<div class="card">
    <h2 class="page-title">Добавление заявки</h2>

    <div class="actions">
        <a class="btn btn-secondary" href="{{ url_for('main.requests_list') }}">Назад к списку</a>
    </div>

    <form method="post">
        <div class="form-row">
            <label>Номер заявки</label>
            <input type="text" name="request_number" required>
        </div>

        <div class="form-row">
            <label>Дата начала</label>
            <input type="text" name="start_date" placeholder="Например: 13.03.2026">
        </div>

        <div class="form-row">
            <label>Тип оборудования</label>
            <input type="text" name="equipment_type" required>
        </div>

        <div class="form-row">
            <label>Модель</label>
            <input type="text" name="equipment_model" required>
        </div>

        <div class="form-row">
            <label>Описание проблемы</label>
            <textarea name="problem_description" required></textarea>
        </div>

        <div class="form-row">
            <label>ФИО клиента</label>
            <input type="text" name="client_name" required>
        </div>

        <div class="form-row">
            <label>Телефон</label>
            <input type="text" name="client_phone" required>
        </div>

        <div class="form-row">
            <label>Статус</label>
            <select name="status">
                <option value="Новая">Новая</option>
                <option value="В работе">В работе</option>
                <option value="Завершена">Завершена</option>
            </select>
        </div>

        <div class="form-row">
            <label>Плановый срок выполнения</label>
            <input type="text" name="planned_end_date" placeholder="Например: 15.03.2026">
        </div>

        <div class="form-row">
            <label>Использованные комплектующие</label>
            <textarea name="repair_parts" placeholder="Например: фильтр, компрессор, шланг"></textarea>
        </div>

        <div class="form-row">
            <label>Назначенный специалист</label>
            <select name="specialist_id">
                <option value="">Не назначен</option>
                {% for specialist in specialists %}
                    <option value="{{ specialist.id }}">{{ specialist.full_name }} ({{ specialist.role }})</option>
                {% endfor %}
            </select>
        </div>

        <button type="submit">Сохранить</button>
    </form>
</div>
{% endblock %}
