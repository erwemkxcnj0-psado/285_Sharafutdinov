<script>
(function () {
  const grid = document.getElementById("reviewsGrid");

  const reviews = [
    {
      author: "Марина Береснева",
      text: "Нашла галерею случайно, хотела подобрать картину в гостиную. Помогли определиться с форматом и цветовой гаммой, показали несколько вариантов. Заказ оформили быстро, после отправки заявки связались и уточнили детали. Работа пришла в отличном состоянии, упаковка надежная."
    },
    {
      author: "Елена Лейканд",
      text: "В 2011 году друзья подарили мне картину на день рождения, и я долго не могла подобрать подходящий вариант оформления и размещения. Здесь помогли с рекомендациями по стилю и сочетанию с интерьером. Очень внимательное отношение и профессиональный вкус. Большое спасибо за аккуратную работу и консультацию."
    },
    {
      author: "Наталья Мызникова",
      text: "Долго выбирала подарок — нужна была небольшая картина в спокойных тонах. В каталоге удобно искать и сравнивать, описание понятное. После оформления заявки перезвонили, подтвердили заказ и согласовали получение. Результатом довольна, качество отличное."
    },
    {
      author: "Мария Мешбанк",
      text: "Очень приятное общение и быстрый отклик. Помогли подобрать картину под интерьер, объяснили нюансы по размеру и цвету. Все сделали аккуратно, спасибо!"
    }
  ];

  function esc(s) {
    return String(s ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function makeCard(r) {
    const item = document.createElement("article");
    item.className = "review-card";

    item.innerHTML = `
      <div class="review-author">${esc(r.author)}</div>
      <p class="review-text">${esc(r.text)}</p>
    `;

    return item;
  }

  grid.innerHTML = "";
  reviews.forEach(r => grid.appendChild(makeCard(r)));
})();
</script>
